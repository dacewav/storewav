import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, set, push } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSyCr2dekkLLifIg0_JlLfEleaV32b5XdvIQ",
  authDomain: "dacewav-store-3b0f5.firebaseapp.com",
  databaseURL: "https://dacewav-store-3b0f5-default-rtdb.firebaseio.com",
  projectId: "dacewav-store-3b0f5",
  storageBucket: "dacewav-store-3b0f5.firebasestorage.app",
  messagingSenderId: "163354805352",
  appId: "1:163354805352:web:d8a99d1d71323de1ed27dd"
});

const db = getDatabase(app);
const auth = getAuth(app);
let currentUser = null;

onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user;
    document.getElementById('auth-area').style.display = 'none';
    document.getElementById('seed-area').style.display = 'block';
    document.getElementById('user-email').textContent = user.email;
  }
});

window.doLogin = async () => {
  const provider = new GoogleAuthProvider();
  await signInWithPopup(auth, provider);
};

function log(msg, type = 'info') {
  const el = document.getElementById('log');
  el.innerHTML += `<div class="status ${type}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

window.seedAdmin = async () => {
  try {
    await set(ref(db, `admins/${currentUser.uid}`), true);
    log(`✅ Admin: ${currentUser.uid}`, 'ok');
  } catch (e) { log(`❌ Admin error: ${e.message}`, 'err'); }
};
